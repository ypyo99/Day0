<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 첫번째 프로그램</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06080f;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    /* ── 배경 그라디언트 오라 ── */
    .bg-aura {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 25% 35%, rgba(56, 189, 248, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 75% 65%, rgba(139, 92, 246, 0.14) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(16, 185, 129, 0.07) 0%, transparent 65%);
    }

    /* ── 파티클 ── */
    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .pt {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(105vh) scale(0.2); opacity: 0; }
      8%   { opacity: 0.8; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-8vh)  scale(1.2); opacity: 0; }
    }

    /* ── 메인 컨테이너 ── */
    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2.5rem 2rem;
    }

    /* ── 아이콘 배지 ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1.2rem;
      border: 1px solid rgba(56, 189, 248, 0.35);
      border-radius: 999px;
      color: rgba(147, 210, 255, 0.8);
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: rgba(56, 189, 248, 0.06);
      margin-bottom: 2rem;
      animation: fadeUp 1s ease 0s both;
    }
    .badge::before { content: '✦'; font-size: 0.65rem; }
    .badge::after  { content: '✦'; font-size: 0.65rem; }

    /* ── 메인 텍스트 ── */
    .title {
      font-size: clamp(2.4rem, 7.5vw, 6.4rem);
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: -0.03em;
      background: linear-gradient(
        130deg,
        #67e8f9 0%,
        #a78bfa 30%,
        #f472b6 55%,
        #34d399 80%,
        #60a5fa 100%
      );
      background-size: 250% 250%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation:
        fadeUp 1s ease 0.2s both,
        gradMove 6s ease-in-out infinite;
      filter: drop-shadow(0 0 48px rgba(167, 139, 250, 0.5));
    }
    @keyframes gradMove {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    /* ── 말줄임 점 ── */
    .dots span {
      display: inline-block;
      animation: dotBounce 1.6s ease-in-out infinite;
    }
    .dots span:nth-child(1) { animation-delay: 0s; }
    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.30s; }
    .dots span:nth-child(4) { animation-delay: 0.45s; }
    @keyframes dotBounce {
      0%, 100% { opacity: 0.25; transform: translateY(0); }
      50%       { opacity: 1;    transform: translateY(-10px); }
    }

    /* ── 구분선 ── */
    .divider {
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #a78bfa, #38bdf8, transparent);
      border-radius: 2px;
      margin: 2rem auto;
      animation: expandLine 1s ease 0.6s both;
    }
    @keyframes expandLine {
      to { width: 220px; }
    }

    /* ── 부제목 ── */
    .sub {
      font-size: clamp(0.8rem, 1.8vw, 1.05rem);
      font-weight: 300;
      color: rgba(180, 200, 240, 0.45);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: fadeUp 1s ease 0.8s both;
    }

    /* ── 하단 코드 힌트 ── */
    .code-hint {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 2.5rem;
      padding: 0.55rem 1.4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 0.8rem;
      color: rgba(134, 239, 172, 0.7);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.05em;
      animation: fadeUp 1s ease 1s both, blink 4s ease-in-out 2s infinite;
    }
    .code-hint .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: rgba(134, 239, 172, 0.8);
      animation: cursorBlink 1s step-end infinite;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── 공통 fadeUp ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-aura"></div>
  <div id="particles"></div>

  <div class="wrap">
    <div class="badge">My First Program</div>

    <h1 class="title">
      내 첫번째 프로그램<span class="dots"><span>.</span><span>.</span><span>.</span><span>.</span></span>
    </h1>

    <div class="divider"></div>

    <p class="sub">Hello &nbsp;·&nbsp; World &nbsp;·&nbsp; Begin</p>

    <div class="code-hint">
      <span>&gt;&nbsp;print("Hello, World!")</span>
      <span class="cursor"></span>
    </div>
  </div>

  <script>
    /* 파티클 생성 */
    const pWrap = document.getElementById('particles');
    const cols = [
      'rgba(103,232,249,0.75)', 'rgba(167,139,250,0.75)',
      'rgba(244,114,182,0.75)', 'rgba(52,211,153,0.75)',
      'rgba(251,191,36,0.65)',  'rgba(96,165,250,0.75)',
    ];
    for (let i = 0; i < 45; i++) {
      const el = document.createElement('div');
      el.className = 'pt';
      const sz  = Math.random() * 5 + 2;
      const col = cols[Math.floor(Math.random() * cols.length)];
      el.style.cssText = `
        width:${sz}px; height:${sz}px;
        left:${Math.random()*100}%;
        background:${col};
        box-shadow:0 0 ${sz*3}px ${col};
        animation-duration:${Math.random()*14+7}s;
        animation-delay:${Math.random()*12}s;
      `;
      pWrap.appendChild(el);
    }
  </script>
</body>
</html>
